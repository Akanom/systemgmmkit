name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,all]"
      - run: python -m pip check
      - run: python -m ruff check .
      - run: python -m pytest

  minimum-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      - run: python -m pip install "numpy==1.23.0" "pandas==1.5.0" "scipy==1.9.0" "matplotlib==3.8.0" "pytest>=8,<10"
      - run: python -m pip install --no-deps -e .
      - run: python -m pytest

  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements/test.txt
      - run: python -m pip install --require-hashes -r requirements/release.txt
      - run: python -m pip install --no-deps .
      - run: python scripts/verify_dependencies.py --project .
      - run: python -m pip check
      - run: python -m pip_audit --strict .
      - run: python -m build
      - run: python -m twine check --strict dist/*
      - run: python scripts/inspect_dist.py dist --output artifact-inventory.json
      - name: Verify wheel-only installation and offline import
        shell: bash
        run: |
          python -m venv .venv-wheel
          wheel=$(ls dist/*.whl)
          .venv-wheel/bin/python -m pip install --only-binary=:all: "$wheel"
          .venv-wheel/bin/python -c "import socket; socket.socket.connect=lambda *a, **k: (_ for _ in ()).throw(RuntimeError('network disabled')); import systemgmmkit"
      - name: Verify source-distribution installation
        shell: bash
        run: |
          python -m venv .venv-sdist
          sdist=$(ls dist/*.tar.gz)
          .venv-sdist/bin/python -m pip install "$sdist"
          .venv-sdist/bin/python -c "import systemgmmkit"
      - run: python -m pip_audit --strict --format cyclonedx-json --output sbom.cdx.json .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-build-artifacts
          path: |
            dist/*
            artifact-inventory.json
            sbom.cdx.json
          if-no-files-found: error

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
