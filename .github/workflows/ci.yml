name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,all]"
      - run: python -m pip check
      - run: python -m ruff check .
      - run: python -m pytest

  minimum-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - run: python -m pip install "numpy==1.23.0" "pandas==1.5.0" "scipy==1.9.0" "matplotlib==3.8.0" "statsmodels==0.14.0" "tabulate==0.9.0" "tomli==2.0.1" "pytest>=8,<10"
      - run: python -m pip install --no-deps -e .
      - run: python -m pytest

  governance-security:
    uses: Akanom/python-package-governance/.github/workflows/reusable-security.yml@256d69be94f67d22548e9f1431b3f9902f235a50
    with:
      python_version: "3.12"
      requirements_file: requirements/test.txt
      release_requirements_file: requirements/release.txt

  governance-build:
    uses: Akanom/python-package-governance/.github/workflows/reusable-build.yml@256d69be94f67d22548e9f1431b3f9902f235a50
    with:
      python_version: "3.12"
      requirements_file: requirements/release.txt
      import_name: systemgmmkit
