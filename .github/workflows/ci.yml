name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,all]"
      - run: python -m pip check
      - run: python -m ruff check .
      - run: python -m pytest

  minimum-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      - run: python -m pip install "numpy==1.23.0" "pandas==1.5.0" "scipy==1.9.0" "matplotlib==3.8.0" "statsmodels==0.14.0" "tabulate==0.9.0" "tomli==2.0.1" "pytest>=8,<10"
      - run: python -m pip install --no-deps -e .
      - run: python -m pytest

  governance-security:
    uses: Akanom/python-package-governance/.github/workflows/reusable-security.yml@09d19a220bdcbd2355c8cc1006def5e913dd4462
    with:
      python_version: "3.12"
      requirements_file: requirements/test.txt
      release_requirements_file: requirements/release.txt

  governance-build:
    uses: Akanom/python-package-governance/.github/workflows/reusable-build.yml@09d19a220bdcbd2355c8cc1006def5e913dd4462
    with:
      python_version: "3.12"
      requirements_file: requirements/release.txt
      import_name: systemgmmkit
